name: Bump version

on:
  push:
    branches: [master]

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          today=$(date -u +"%Y.%-m.%-d")
          current=$(grep -oP '__version__ = "\K[^"]+' src/debussy/__init__.py)
          current_prefix=$(echo "$current" | sed 's/\.[^.]*$//')
          current_n=$(echo "$current" | grep -oP '[^.]+$')

          if [ "$current_prefix" = "$today" ]; then
            new_n=$((current_n + 1))
          else
            new_n=1
          fi

          new_version="${today}.${new_n}"
          sed -i "s/__version__ = \".*\"/__version__ = \"${new_version}\"/" src/debussy/__init__.py
          echo "VERSION=${new_version}" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/debussy/__init__.py
          git diff --cached --quiet && exit 0
          git commit -m "bump version to ${VERSION} [skip ci]"
          git push
